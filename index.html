<!DOCTYPE html>
<html lang="en">
<head>

    <title>DOLO's Spittoon: The Fallen Idols</title>

        #gameCanvas { display:block; margin:0 auto; background:#1a1a2e; box-shadow:0 0 30px gold; }
        
        #ui { position:absolute; top:15px; left:15px; color:gold; font-size:24px; font-weight:bold; text-shadow:2px 2px 4px #000; pointer-events:none; z-index:10; display:none; }
        #combo { position:absolute; top:60px; left:50%; transform:translateX(-50%); color:#00ff9d; font-size:28px; font-weight:bold; text-shadow:0 0 10px #00ff9d; pointer-events:none; display:none; z-index:10; }
        
        #startScreen { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(10,10,20,0.85); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:20; }
        #startScreen h1 { color:gold; font-size:48px; line-height:1; text-shadow:4px 4px 0px #b30000, 0 0 20px gold; margin:0 0 10px 0; text-align:center; font-weight:900; letter-spacing: 2px;}
        #startScreen h2 { color:#fff; font-size:18px; margin:0 0 20px 0; text-align:center; letter-spacing:4px; text-shadow:2px 2px 0px #000; }
        #introPlayer { width: 120px; margin-bottom: 30px; filter: drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
        #startBtn { background:transparent; color:#00ff9d; border:3px solid #00ff9d; padding:15px 40px; font-size:26px; font-weight:bold; animation:blink 1s infinite; width:auto; border-radius:0; cursor:pointer; font-family:'Courier New', monospace; box-shadow: inset 0 0 10px #00ff9d, 0 0 10px #00ff9d; }
        @keyframes blink { 0% { opacity:1; } 50% { opacity:0.2; } 100% { opacity:1; } }

        #gameover { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; color:white; display:none; background:rgba(0,0,0,0.97); padding:30px; border:3px solid gold; border-radius:15px; width:90%; max-width:340px; z-index:30; }
        button { background:gold; color:#000; border:none; padding:14px; font-size:17px; font-weight:bold; margin:8px 0; width:100%; border-radius:8px; cursor:pointer; }
        button:hover { background:#ffcc00; transform:scale(1.05); }
    </style>
</head>

        <h1>DOLO'S<br>SPITTOON</h1>
        <h2>THE FALLEN IDOLS</h2>
        <img id="introPlayer" src="Player.png" alt="DOLO" onerror="this.style.display='none'">
        <button id="startBtn">INSERT COIN</button>
    </div>

    <div id="combo"></div>

        <button id="claimBtn" style="display:none;background:#00ff9d;color:#000;">Claim $DOLO Airdrop</button>
