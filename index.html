<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLO's Spittoon: The Fallen Idols</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#0f0f1a; font-family:'Courier New', monospace; touch-action:none; }
        #gameCanvas { display:block; margin:0 auto; background:#1a1a2e; box-shadow:0 0 30px gold; }
        
        #ui { position:absolute; top:15px; left:15px; color:gold; font-size:24px; font-weight:bold; text-shadow:2px 2px 4px #000; pointer-events:none; z-index:10; display:none; }
        #combo { position:absolute; top:60px; left:50%; transform:translateX(-50%); color:#00ff9d; font-size:28px; font-weight:bold; text-shadow:0 0 10px #00ff9d; pointer-events:none; display:none; z-index:10; }
        
        #startScreen { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(10,10,20,0.85); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:20; }
        #startScreen h1 { color:gold; font-size:48px; line-height:1; text-shadow:4px 4px 0px #b30000, 0 0 20px gold; margin:0 0 10px 0; text-align:center; font-weight:900; letter-spacing: 2px;}
        #startScreen h2 { color:#fff; font-size:18px; margin:0 0 20px 0; text-align:center; letter-spacing:4px; text-shadow:2px 2px 0px #000; }
        #introPlayer { width: 120px; margin-bottom: 30px; filter: drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
        #startBtn { background:transparent; color:#00ff9d; border:3px solid #00ff9d; padding:15px 40px; font-size:26px; font-weight:bold; animation:blink 1s infinite; width:auto; border-radius:0; cursor:pointer; font-family:'Courier New', monospace; box-shadow: inset 0 0 10px #00ff9d, 0 0 10px #00ff9d; }
        @keyframes blink { 0% { opacity:1; } 50% { opacity:0.2; } 100% { opacity:1; } }

        #gameover { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; color:white; display:none; background:rgba(0,0,0,0.97); padding:30px; border:3px solid gold; border-radius:15px; width:90%; max-width:340px; z-index:30; }
        button { background:gold; color:#000; border:none; padding:14px; font-size:17px; font-weight:bold; margin:8px 0; width:100%; border-radius:8px; cursor:pointer; }
        button:hover { background:#ffcc00; transform:scale(1.05); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <audio id="bgm" src="BGM.mp3" loop></audio>

    <div id="startScreen">
        <h1>DOLO'S<br>SPITTOON</h1>
        <h2>THE FALLEN IDOLS</h2>
        <img id="introPlayer" src="Player.png" alt="DOLO" onerror="this.style.display='none'">
        <button id="startBtn">INSERT COIN</button>
    </div>

    <div id="ui">SCORE: <span id="score">0</span> / 69420</div>
    <div id="combo"></div>
    
    <div id="gameover">
        <h2 style="color:gold;margin:0 0 15px;">PTOOEY 💦</h2>
        <p>Your Score: <strong id="finalScore" style="font-size:32px;color:gold;"></strong></p>
        <p id="message" style="line-height:1.5;white-space:pre-wrap;"></p>
        <button id="reviveBtn">Share on X to Unlock</button>
        <button id="claimBtn" style="display:none;background:#00ff9d;color:#000;">Claim $DOLO Airdrop</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    try {
        const tg = window.Telegram?.WebApp || null;
        if (tg) { tg.expand(); tg.ready(); }
    } catch(e) {}

    canvas.width = window.innerWidth > 600 ? 600 : window.innerWidth;
    canvas.height = window.innerHeight;

    const ASSETS = {};
    const imgNames = {
        player: 'Player.png', 
        johnD: 'JohnD.png', 
        mrG: 'mrG.png', 
        doge: 'DOGE.png', 
        pepe: 'PEPE.png', 
        bg: 'BG.jpg'
    };

    let assetsLoaded = 0;
    const totalAssets = Object.keys(imgNames).length;

    for (let key in imgNames) {
        ASSETS[key] = new Image();
        ASSETS[key].src = imgNames[key];
        ASSETS[key].onload = () => {
            assetsLoaded++;
            if (assetsLoaded === totalAssets && !isGameStarted && !document.getElementById('gameover').style.display) {
                drawBackground(); 
                player.draw();
            }
        };
    }

    let audioCtx;

    function initAudio() {
        try {
            const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtxClass) return;
            if (!audioCtx) audioCtx = new AudioCtxClass();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        } catch(e) {
            console.log("Audio blocked by browser, ignoring.", e);
        }
    }

    function playSoundEffect(type) {
        try {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'johnD') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'mrG') {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                oscillator.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.15); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.15);
            } else {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(500, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1); 
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.1);
            }
        } catch(e) {}
    }

    let score = 0, combo = 0, comboTimer = 0, shake = 0;
    let isGameOver = false, isGameStarted = false;
    let lastSpawn = 0, gameStart = 0;
    let isPointerDown = false;
    let lastShotTime = 0;
    let lastFrameTime = performance.now(); 
    
    const FIRE_RATE = 150; 
    const AIRDROP_HURDLE = 69420;
    let particles = [], floats = [];

    function getGameIntensity() {
        if (score >= 58000) return 1.0;
        if (score >= 100) return 0.1 + 0.9 * ((score - 100) / 57900);
        return 0; 
    }

    class Player {
        constructor() { this.w=72; this.h=92; this.x=canvas.width/2-this.w/2; this.y=canvas.height-this.h-40; }
        draw() {
            if (ASSETS.player.complete && ASSETS.player.naturalWidth) { 
                const ratio = ASSETS.player.naturalHeight / ASSETS.player.naturalWidth;
                this.h = this.w * ratio; 
                this.y = canvas.height - this.h - 40; 
                ctx.drawImage(ASSETS.player, this.x, this.y, this.w, this.h); 
                return; 
            }
            ctx.fillStyle = '#f8f8f8'; ctx.beginPath(); ctx.ellipse(this.x+36, this.y+45, 32, 38, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ff0000'; ctx.fillRect(this.x+18, this.y+18, 36, 12); 
        }
        update(tx) { this.x = Math.max(0, Math.min(canvas.width-this.w, tx-this.w/2)); }
    }

    class Spit {
        constructor(x, y) {
            this.x = x + 33; this.y = y + 28;
            this.w = 12; this.h = 20; 
            this.speed = 16.1; 
            this.trail = [];
        }
        update(ts) {
            this.y -= this.speed * ts; 
            this.trail.push({x: this.x + 3, y: this.y + 12});
            if (this.trail.length > 7) this.trail.shift();
        }
        draw() {
            ctx.shadowBlur = 18; ctx.shadowColor = '#88eeff';
            for (let i = 0; i < this.trail.length; i++) {
                const a = (i + 1) / this.trail.length * 0.7;
                ctx.globalAlpha = a; ctx.fillStyle = '#44ddff';
                ctx.fillRect(this.trail[i].x, this.trail[i].y, 5, 7);
            }
            ctx.globalAlpha = 1; ctx.shadowBlur = 0;
            ctx.shadowBlur = 35; ctx.shadowColor = '#66eeff';
            ctx.fillStyle = '#00ccff'; ctx.beginPath();
            ctx.ellipse(this.x + 4, this.y + 10, 6, 15, 0, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    class Enemy {
        constructor(x) {
            this.w=68; this.h=78; 
            this.x = x !== undefined ? x : Math.random()*(canvas.width-this.w); 
            this.y=-this.h;
            this.type = ['johnD','mrG','doge','pepe'][Math.floor(Math.random()*4)];
            
            // 🔥 Exact 60 points per target
            this.pts = 60; 
            
            this.baseSpeed = (this.type === 'johnD' || this.type === 'mrG') ? 2.4 : 1.5;
        }
        draw() {
            if (ASSETS[this.type].complete && ASSETS[this.type].naturalWidth) { 
                const ratio = ASSETS[this.type].naturalHeight / ASSETS[this.type].naturalWidth;
                this.h = this.w * ratio; 
                ctx.drawImage(ASSETS[this.type], this.x, this.y, this.w, this.h); 
                return; 
            }
            ctx.fillStyle='#f5d0b5'; ctx.fillRect(this.x+10,this.y+10,48,35); 
        }
        update(ts) { 
            const intensity = getGameIntensity();
            const MAX_SPEED_BONUS = 7.8; 
            const currentSpeed = this.baseSpeed + (intensity * MAX_SPEED_BONUS);
            
            this.y += currentSpeed * ts; 
            
            if (score > 10000 && (this.type==='johnD' || this.type==='mrG')) {
                 if(Math.random() < 0.05 * ts) this.x += (Math.random()-0.5)*15 * ts; 
            }
        }
    }

    class Particle {
        constructor(x,y,color='#ffd700') { 
            this.x=x; this.y=y; this.vx=(Math.random()-0.5)*14; this.vy=(Math.random()-0.5)*14-5; 
            this.life=38; this.size=8; this.color=color;
        }
        update(ts) { 
            this.x += this.vx * ts; 
            this.y += this.vy * ts; 
            this.life -= 1 * ts; 
            this.vy += 0.25 * ts; 
        }
        draw() { ctx.globalAlpha=Math.max(0, this.life)/38; ctx.fillStyle=this.color; ctx.fillRect(this.x,this.y,this.size,this.size); ctx.globalAlpha=1; }
    }

    class FloatingScore {
        constructor(x,y,pts) { this.x=x; this.y=y; this.pts=pts; this.life=45; this.vy=-1.5; }
        update(ts) { 
            this.y += this.vy * ts; 
            this.life -= 1 * ts; 
        }
        draw() { 
            ctx.globalAlpha = Math.max(0, this.life)/45;
            ctx.fillStyle = '#00ff9d'; ctx.font = 'bold 22px Courier New'; ctx.textAlign = 'center';
            ctx.fillText('+' + this.pts, this.x, this.y);
            ctx.globalAlpha = 1;
        }
    }

    const player = new Player();
    let spits = [], enemies = [];

    function drawBackground() {
        if (ASSETS.bg.complete && ASSETS.bg.naturalHeight !== 0) {
            ctx.drawImage(ASSETS.bg,0,0,canvas.width,canvas.height);
        } else {
            const grad = ctx.createLinearGradient(0,0,0,canvas.height);
            grad.addColorStop(0,'#2a1f4a'); grad.addColorStop(1,'#0f0f1a');
            ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);
        }
    }

    function spawn() {
        const intensity = getGameIntensity();
        const maxInterval = 450; 
        const minInterval = 100; 
        const baseInterval = maxInterval - (intensity * (maxInterval - minInterval)); 
        
        const jitter = (Math.random() * 80) - 40; 
        const interval = baseInterval + jitter;
        
        if (Date.now()-lastSpawn > interval) { 
            let newX;
            let isOverlapping = true;
            let attempts = 0;
            
            while(isOverlapping && attempts < 15) {
                newX = Math.random()*(canvas.width - 68); 
                isOverlapping = false;
                for(let e of enemies) {
                    if (e.y < 70 && Math.abs(e.x - newX) < 70) { 
                        isOverlapping = true;
                        break;
                    }
                }
                attempts++;
            }
            enemies.push(new Enemy(newX)); 
            lastSpawn = Date.now(); 
        }
    }

    function hitEffect(x,y,pts, type) {
        if (isGameOver) return; 

        combo++; comboTimer = 60;
        document.getElementById('combo').style.display = 'block';
        document.getElementById('combo').innerText = combo + ' COMBO!';
        
        let gained = pts; 
        if (score + gained >= AIRDROP_HURDLE) {
            gained = AIRDROP_HURDLE - score;
            score = AIRDROP_HURDLE;
        } else {
            score += gained;
        }
        
        document.getElementById('score').innerText = score;

        playSoundEffect(type);

        for (let i=0;i<48;i++) { particles.push(new Particle(x,y, combo>3 ? '#ff00aa' : '#ffd700')); }
        for (let i=0;i<12;i++) { const p = new Particle(x,y,'#ffff00'); p.life = 22; particles.push(p); }

        floats.push(new FloatingScore(x,y, gained));
        if (gained > 0) shake = 8;

        if (score >= AIRDROP_HURDLE) {
            triggerVictory();
        }
    }

    function gameLoop(timestamp) {
        if (!isGameStarted || isGameOver) return;
        
        if (!timestamp) timestamp = performance.now();
        let dt = timestamp - lastFrameTime;
        lastFrameTime = timestamp;
        
        if (dt > 100) dt = 16.66; 
        const ts = dt / 16.66; 

        ctx.clearRect(0,0,canvas.width,canvas.height);

        if (score >= AIRDROP_HURDLE) { 
            score = AIRDROP_HURDLE;
            document.getElementById('score').innerText = score;
            triggerVictory(); 
            return; 
        }

        drawBackground();
        spawn();
        
        if (isPointerDown && Date.now() - lastShotTime > FIRE_RATE) {
            spits.push(new Spit(player.x, player.y));
            lastShotTime = Date.now();
        }

        for (let i=spits.length-1;i>=0;i--) {
            spits[i].update(ts); spits[i].draw();
            if (spits[i].y < -40) spits.splice(i,1);
        }

        for (let i=enemies.length-1;i>=0;i--) {
            const e = enemies[i];
            e.update(ts); e.draw();

            for (let j=spits.length-1;j>=0;j--) {
                const s = spits[j];
                if (s.x < e.x+e.w && s.x+s.w > e.x && s.y < e.y+e.h && s.y+s.h > e.y) {
                    hitEffect(e.x+e.w/2, e.y+e.h/2, e.pts, e.type);
                    enemies.splice(i,1); spits.splice(j,1);
                    break;
                }
            }

            if (e && !isGameOver && (e.y > canvas.height || 
                (e.x < player.x+player.w && e.x+e.w > player.x && e.y < player.y+player.h && e.y+e.h > player.y))) {
                triggerGameOver();
            }
        }

        for (let i=particles.length-1;i>=0;i--) { particles[i].update(ts); particles[i].draw(); if (particles[i].life<=0) particles.splice(i,1); }
        for (let i=floats.length-1;i>=0;i--) { floats[i].update(ts); floats[i].draw(); if (floats[i].life<=0) floats.splice(i,1); }

        if (comboTimer > 0) comboTimer -= 1 * ts; 
        else { combo = 0; document.getElementById('combo').style.display='none'; }

        ctx.save();
        if (shake > 0) {
            ctx.translate(Math.random()*shake- shake/2, Math.random()*shake-shake/2);
            shake *= Math.pow(0.85, ts); 
        }
        player.draw();
        ctx.restore();

        if (!isGameOver) requestAnimationFrame(gameLoop);
    }

    function triggerGameOver() {
        isGameOver = true;
        try { sessionStorage.setItem('dolo_death_lock', score); } catch(e) {}
        
        document.getElementById('finalScore').innerText = score;
        document.getElementById('message').innerText = `Locked out.\nYou died at ${score}.\n\nShare on X to unlock the game!\n"You're Fired. PTOOEY."`;
        
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('ui').style.display = 'none';
        document.getElementById('reviveBtn').style.display = 'block';
        document.getElementById('claimBtn').style.display = 'none';
        document.getElementById('gameover').style.display = 'block';
        
        try {
            const bgm = document.getElementById('bgm');
            if(bgm) bgm.pause(); 
        } catch(e) {}
    }

    function triggerVictory() {
        isGameOver = true;
        document.getElementById('finalScore').innerText = score;
        document.getElementById('message').innerHTML = `All fake idols shattered!<br>Airdrop list confirmed.<br><br>The legend begins. PTOOEY. 💦`;
        document.getElementById('reviveBtn').style.display = 'none';
        document.getElementById('claimBtn').style.display = 'block';
        document.getElementById('gameover').style.display = 'block';
        
        try {
            const bgm = document.getElementById('bgm');
            if(bgm) bgm.pause(); 
        } catch(e) {}
    }

    function startGameFlow(e) {
        if (e) e.preventDefault();
        if (isGameStarted) return; 
        
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        
        isGameStarted = true;
        gameStart = Date.now();
        lastSpawn = Date.now();
        lastFrameTime = performance.now(); 
        
        initAudio();
        try {
            const bgm = document.getElementById('bgm');
            if(bgm) {
                bgm.volume = 0.5;
                bgm.play().catch(err => console.log("BGM Blocked by OS"));
            }
        } catch(e) {}

        requestAnimationFrame(gameLoop);
    }

    try {
        const deathLockScore = sessionStorage.getItem('dolo_death_lock');
        if (deathLockScore !== null) {
            score = parseInt(deathLockScore);
            triggerGameOver(); 
        } else {
            drawBackground();
            player.draw();
        }
    } catch(e) {
        drawBackground();
        player.draw();
    }

    const startBtn = document.getElementById('startBtn');
    startBtn.addEventListener('pointerdown', startGameFlow);
    startBtn.addEventListener('click', startGameFlow);

    canvas.addEventListener('pointerdown', e => {
        if (!isGameStarted || isGameOver) return;
        try {
            initAudio();
            const bgm = document.getElementById('bgm');
            if(bgm && bgm.paused) bgm.play().catch(err => {});
        } catch(e) {}

        player.update(e.clientX - canvas.offsetLeft);
        spits.push(new Spit(player.x, player.y));
        isPointerDown = true;
        lastShotTime = Date.now();
    });

    canvas.addEventListener('pointerup', () => { isPointerDown = false; });
    canvas.addEventListener('pointerleave', () => { isPointerDown = false; });
    canvas.addEventListener('pointercancel', () => { isPointerDown = false; });

    canvas.addEventListener('pointermove', e => {
        if (isGameStarted && !isGameOver) player.update(e.clientX - canvas.offsetLeft);
    });

    canvas.addEventListener('touchmove', e => {
        if (!isGameStarted || isGameOver) return;
        e.preventDefault();
        const touch = e.touches[0];
        player.update(touch.clientX - canvas.offsetLeft);
    }, { passive: false });

    document.getElementById('reviveBtn').onclick = () => {
        const text = encodeURIComponent(`@DOLO_Sp I was crushing fake idols but died at ${score}... PTOOEY 💦 #DOLO`);
        window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
        
        const unlockSequence = () => {
            try { sessionStorage.removeItem('dolo_death_lock'); } catch(e) {}
            location.reload(); 
        };
        window.addEventListener('focus', unlockSequence, {once:true});
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') unlockSequence();
        }, {once:true});
    };

    document.getElementById('claimBtn').onclick = () => alert('✅ Verification pending. Connect Wallet in the next step.');

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth > 600 ? 600 : window.innerWidth;
        canvas.height = window.innerHeight;
        player.y = canvas.height - player.h - 40;
    });

</script>
</body>
</html>
